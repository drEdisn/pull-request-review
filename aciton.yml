name: 'AI Code Review Gate'
description: 'Оценивает PR через AI'

inputs:
  groq-api-key:
    description: 'API ключ для Groq'
    required: true
  threshold:
    description: 'Минимальный проходной балл (0-100)'
    required: false
    default: '70'
  custom-rules:
    description: 'Правила оценки'
    required: false
    default: ''

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.groq-api-key }}
    - ${{ inputs.threshold }}
    - ${{ inputs.custom-rules }}

branding:
  icon: 'check-circle'
  color: 'green'
